function fmt(n) { return n.toLocaleString('en-US'); }
function fmtM(n) { return (n/1e6).toFixed(1)+'M'; }

function stAdj(st) {
  const d = BY_STATE[st]; if (!d) return null;
  const vz=(d.a_prov&&d.a_prov.Verizon)||0, fr=(d.a_prov&&d.a_prov.Frontier)||0;
  const ch=(d.b_prov&&d.b_prov.Charter)||0, cx=(d.b_prov&&d.b_prov.Cox)||0;
  const unrep_a = Math.round(vz*(FACTOR.vz-1) + fr*(FACTOR.fr-1));
  const unrep_b = Math.round(ch*(FACTOR.ch-1) + cx*(FACTOR.cx-1));
  const totA = vz+fr;
  const fa = totA > 0 ? (vz*FACTOR.vz + fr*FACTOR.fr)/totA : 1;
  return { unrep_a, unrep_b, lo:d.overlap, hi:Math.round(d.overlap*fa) };
}

let natUnA=0,natUnB=0,natHi=0;
for (const st of Object.keys(BY_STATE)) { const a=stAdj(st); if(a){natUnA+=a.unrep_a;natUnB+=a.unrep_b;natHi+=a.hi;} }

function buildStateLayers(geo) {
  const maxGA = Math.max(...Object.values(BY_STATE).map(d=>d.ga));
  const maxGB = Math.max(...Object.values(BY_STATE).map(d=>d.gb));
  const maxOvl = Math.max(...Object.values(BY_STATE).map(d=>d.overlap));

  // VZ + Frontier layer (red)
  L.geoJSON(geo, {
    style: function(feature) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.ga <= 0) return {fillOpacity:0, weight:0, opacity:0};
      const intensity = Math.min(0.4, 0.06 + (d.ga / maxGA) * 0.34);
      return { color:VZ_RED, fillColor:VZ_RED, fillOpacity:intensity, weight:1, opacity:0.4 };
    },
    onEachFeature: function(feature, layer) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.ga <= 0) return;
      layer.bindPopup(`<div class="popup-hdr" style="color:${VZ_RED}">${feature.properties.name} &mdash; VZ / Frontier</div>
        <div class="popup-row"><span class="popup-lbl">Fiber BSLs:</span><span class="popup-val" style="color:${VZ_RED}">${fmt(d.ga)}</span></div>
        <div class="popup-row"><span class="popup-lbl">Est. unreported:</span><span class="popup-val" style="color:${AMBER}">+${fmt(stAdj(abbr).unrep_a)}</span></div>
      `);
      layer.on('mouseover', function(){ this.setStyle({weight:2, fillOpacity: Math.min(0.5, this.options.fillOpacity+0.1)}); });
      layer.on('mouseout', function(){ vzGeo.resetStyle(this); });
    }
  }).addTo(vzLayer);
  window.vzGeo = vzLayer.getLayers()[0];
  var vzGeo = window.vzGeo;

  // Charter + Cox layer (blue)
  L.geoJSON(geo, {
    style: function(feature) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.gb <= 0) return {fillOpacity:0, weight:0, opacity:0};
      const intensity = Math.min(0.35, 0.05 + (d.gb / maxGB) * 0.30);
      return { color:CHTR_BLUE, fillColor:CHTR_BLUE, fillOpacity:intensity, weight:1, opacity:0.35 };
    },
    onEachFeature: function(feature, layer) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.gb <= 0) return;
      layer.bindPopup(`<div class="popup-hdr" style="color:${CHTR_BLUE}">${feature.properties.name} &mdash; Charter / Cox</div>
        <div class="popup-row"><span class="popup-lbl">Broadband BSLs:</span><span class="popup-val" style="color:${CHTR_BLUE}">${fmt(d.gb)}</span></div>
        <div class="popup-row"><span class="popup-lbl">Est. unreported:</span><span class="popup-val" style="color:${AMBER}">+${fmt(stAdj(abbr).unrep_b)}</span></div>
      `);
      layer.on('mouseover', function(){ this.setStyle({weight:2, fillOpacity: Math.min(0.45, this.options.fillOpacity+0.1)}); });
      layer.on('mouseout', function(){ chGeo.resetStyle(this); });
    }
  }).addTo(chtrLayer);
  window.chGeo = chtrLayer.getLayers()[0];
  var chGeo = window.chGeo;

  // Overlap layer (purple)
  L.geoJSON(geo, {
    style: function(feature) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.overlap <= 0) return {fillOpacity:0, weight:0, opacity:0};
      const intensity = Math.min(0.5, 0.08 + (d.overlap / maxOvl) * 0.42);
      return { color:OVL_PURPLE, fillColor:OVL_PURPLE, fillOpacity:intensity, weight:2, opacity:0.6, dashArray:'4,3' };
    },
    onEachFeature: function(feature, layer) {
      const abbr = ST_ABBR[feature.properties.name];
      const d = abbr && BY_STATE[abbr];
      if (!d || d.overlap <= 0) return;
      const a = stAdj(abbr);
      const rate = d.ga>0?(d.overlap/d.ga*100).toFixed(1):'0';
      layer.bindPopup(`<div class="popup-hdr" style="color:${OVL_PURPLE}">${feature.properties.name} &mdash; Overlap</div>
        <div class="popup-row"><span class="popup-lbl">BDC Overlap:</span><span class="popup-val" style="color:${OVL_PURPLE}">${fmt(d.overlap)}</span></div>
        <div class="popup-row"><span class="popup-lbl">Est. Range:</span><span class="popup-val">${fmt(a.lo)} &ndash; ${fmt(a.hi)}</span></div>
        <div class="popup-row"><span class="popup-lbl">Overlap Rate:</span><span class="popup-val">${rate}%</span></div>
        <div class="popup-row"><span class="popup-lbl">~Households:</span><span class="popup-val" style="color:#059669">${fmt(Math.round(d.overlap*0.93))}</span></div>
      `);
      layer.on('mouseover', function(){ this.setStyle({weight:3, fillOpacity: Math.min(0.6, this.options.fillOpacity+0.12)}); });
      layer.on('mouseout', function(){ ovGeo.resetStyle(this); });
    }
  }).addTo(ovlLayer);
  window.ovGeo = ovlLayer.getLayers()[0];
  var ovGeo = window.ovGeo;
}

function buildCountyCircles() {
  COUNTIES.forEach(c => {
    const r = Math.max(3, Math.sqrt(c.o / 1200));
    const op = Math.min(0.7, 0.15 + c.o / 700000);
    const rate = c.a>0?(c.o/c.a*100).toFixed(1):'0';
    L.circleMarker([c.lat,c.lng], {
      radius:r, color:OVL_PURPLE, fillColor:OVL_PURPLE, fillOpacity:op, weight:1.5, opacity:0.7
    }).bindPopup(`
      <div class="popup-hdr" style="color:${OVL_PURPLE}">${c.n} County, ${c.s}</div>
      <div class="popup-row"><span class="popup-lbl">Overlap BSLs:</span><span class="popup-val" style="color:${OVL_PURPLE}">${fmt(c.o)}</span></div>
      <div class="popup-row"><span class="popup-lbl">VZ+FR Fiber:</span><span class="popup-val" style="color:${VZ_RED}">${fmt(c.a)}</span></div>
      <div class="popup-row"><span class="popup-lbl">CHTR+COX Cable:</span><span class="popup-val" style="color:${CHTR_BLUE}">${fmt(c.b)}</span></div>
      <div class="popup-row"><span class="popup-lbl">Rate:</span><span class="popup-val">${rate}%</span></div>
      <div class="popup-row"><span class="popup-lbl">~Households:</span><span class="popup-val" style="color:#059669">${fmt(Math.round(c.o*0.93))}</span></div>
    `).addTo(ovlLayer);
  });
}

function buildFallbackMarkers() {
  // If GeoJSON fetch fails, use circle markers at state centroids
  const STATE_POS={AL:[32.32,-86.90],AZ:[34.05,-111.09],AR:[35.20,-91.83],CA:[36.78,-119.42],CO:[39.55,-105.78],CT:[41.60,-72.76],DE:[38.91,-75.53],DC:[38.91,-77.04],FL:[27.66,-81.52],GA:[32.17,-83.50],HI:[19.90,-155.58],ID:[44.07,-114.74],IL:[40.63,-89.40],IN:[40.27,-86.13],IA:[41.88,-93.10],KS:[38.51,-98.38],KY:[37.67,-84.67],LA:[30.98,-91.96],ME:[45.37,-69.24],MD:[39.04,-76.64],MA:[42.41,-71.38],MI:[44.31,-84.63],MN:[46.73,-94.69],MS:[32.35,-89.40],MO:[38.46,-92.29],MT:[46.87,-110.36],NE:[41.49,-99.90],NV:[38.80,-116.42],NH:[43.19,-71.57],NJ:[40.06,-74.41],NM:[34.52,-105.87],NY:[42.50,-75.70],OH:[40.42,-82.91],OK:[35.47,-97.52],OR:[43.80,-120.55],PA:[41.20,-77.19],RI:[41.58,-71.48],SC:[33.84,-81.16],TN:[35.52,-86.58],TX:[31.97,-99.90],VA:[37.43,-78.66],VT:[44.56,-72.58],WA:[47.75,-120.74],WV:[38.60,-80.45],WI:[43.78,-88.79],WY:[43.08,-107.29]};
  for (const [st,d] of Object.entries(BY_STATE)) {
    if (!STATE_POS[st]) continue;
    const pos = STATE_POS[st];
    if (d.ga > 0) L.circleMarker(pos,{radius:Math.max(6,Math.sqrt(d.ga/400)),color:VZ_RED,fillColor:VZ_RED,fillOpacity:0.2,weight:1,opacity:0.4}).addTo(vzLayer);
    if (d.gb > 0) L.circleMarker(pos,{radius:Math.max(6,Math.sqrt(d.gb/400)),color:CHTR_BLUE,fillColor:CHTR_BLUE,fillOpacity:0.2,weight:1,opacity:0.4}).addTo(chtrLayer);
    if (d.overlap > 0) L.circleMarker(pos,{radius:Math.max(5,Math.sqrt(d.overlap/200)),color:OVL_PURPLE,fillColor:OVL_PURPLE,fillOpacity:0.35,weight:1.5,opacity:0.6}).addTo(ovlLayer);
  }
}

// ================================================================
// BLOCK GROUP DYNAMIC LOADING
// ================================================================

function setStateLayers_interactive(enable) {
  // Disable pointer-events on the overlay-pane canvas so bgPane canvas receives clicks
  var overlayPane = map.getPane('overlayPane');
  if (overlayPane) {
    var canvas = overlayPane.querySelector('canvas');
    if (canvas) canvas.style.pointerEvents = enable ? 'auto' : 'none';
  }
  // Dim or restore state-level GeoJSON layer styles
  [vzLayer, chtrLayer, ovlLayer].forEach(function(layerGroup) {
    if (!layerGroup) return;
    layerGroup.eachLayer(function(geoLayer) {
      if (!geoLayer.eachLayer) return;
      if (enable) {
        geoLayer.resetStyle();
      } else {
        geoLayer.eachLayer(function(layer) {
          var fo = layer.options.fillOpacity || 0;
          var op = layer.options.opacity || 0;
          layer.setStyle({ fillOpacity: fo * 0.25, opacity: op * 0.25 });
        });
      }
    });
  });
}

function updateBgVisibility() {
  if (!bgActive) {
    setStateLayers_interactive(true);
    return;
  }
  var hint = document.getElementById('bgHint');
  if (map.getZoom() < 8) {
    if (hint) hint.style.display = 'block';
    setStateLayers_interactive(true);
  } else {
    if (hint) hint.style.display = 'none';
    setStateLayers_interactive(false);
    loadVisibleBlockGroups();
  }
}

function loadVisibleBlockGroups() {
  if (!bgActive || map.getZoom() < 8) return;
  if (typeof BG_BY_COUNTY === 'undefined' || Object.keys(BG_BY_COUNTY).length === 0) return;

  var bounds = map.getBounds();
  // Pad bounds by ~50km (0.5 deg) to catch counties whose centroid is outside
  // but whose area overlaps the current view (critical for large counties at high zoom)
  var pad = 0.5;
  var padded = L.latLngBounds(
    [bounds.getSouth() - pad, bounds.getWest() - pad],
    [bounds.getNorth() + pad, bounds.getEast() + pad]
  );

  // Find visible counties from our COUNTIES array that have BG data
  var toLoad = [];
  COUNTIES.forEach(function(c) {
    if (!padded.contains([c.lat, c.lng])) return;
    if (loadedCounties[c.f] && loadedCounties[c.f] !== 'loading') return;  // already loaded
    if (loadedCounties[c.f] === 'loading') return;  // currently fetching
    if (!BG_BY_COUNTY[c.f]) return;   // no block group data
    toLoad.push(c);
  });

  if (toLoad.length === 0) return;

  // Load sequentially with 200ms delay to avoid rate limiting
  var delay = 0;
  toLoad.forEach(function(county) {
    loadedCounties[county.f] = 'loading';
    setTimeout(function() {
      fetchCountyBlockGroups(county.f, county.n, county.s);
    }, delay);
    delay += 200;
  });
}

function fetchCountyBlockGroups(countyFips, countyName, stateAbbr) {
  var stateFips = countyFips.substring(0, 2);
  var countyCode = countyFips.substring(2, 5);

  var url = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Current/MapServer/10/query';
  var params = 'where=' + encodeURIComponent("STATE='" + stateFips + "' AND COUNTY='" + countyCode + "'") +
    '&outFields=GEOID,AREALAND&outSR=4326&f=geojson&returnGeometry=true';

  var loadEl = document.getElementById('bgLoading');
  bgLoadingCount++;
  if (loadEl) loadEl.style.display = 'block';

  fetch(url + '?' + params)
    .then(function(r) { return r.json(); })
    .then(function(geojson) {
      renderCountyBlockGroups(countyFips, countyName, stateAbbr, geojson);
    })
    .catch(function(err) {
      console.warn('Failed to load block groups for ' + countyFips + ': ' + err);
      loadedCounties[countyFips] = 'failed';
    })
    .finally(function() {
      bgLoadingCount--;
      if (bgLoadingCount <= 0) {
        bgLoadingCount = 0;
        if (loadEl) loadEl.style.display = 'none';
      }
    });
}

function renderCountyBlockGroups(countyFips, countyName, stateAbbr, geojson) {
  var countyLayer = L.layerGroup();
  var features = (geojson && geojson.features) || [];
  var bgIds = BG_BY_COUNTY[countyFips] || [];
  var bgIdSet = {};
  bgIds.forEach(function(id) { bgIdSet[id] = true; });

  // Filter to only block groups with overlap
  var relevant = features.filter(function(f) {
    var gid = f.properties && f.properties.GEOID;
    return gid && bgIdSet[gid];
  });

  // console.log('[BG] render ' + countyFips + ': ' + relevant.length + ' of ' + features.length + ' features');

  // Render all at once (canvas renderer handles large counts efficiently)
  var errors = 0;
  for (var i = 0; i < relevant.length; i++) {
    var feature = relevant[i];
    var bgId = feature.properties.GEOID;
    var data = BG_OVERLAP[bgId];
    if (!data) continue;

    var intensity = bgIntensity(data.o);
    var fillColor = bgFillColor(data.o, data.of, data.oh);

    try {
      var popupHtml = buildBGPopup(bgId, data, countyName, stateAbbr);
      var myIntensity = intensity;
      var poly = L.geoJSON(feature, {
        pane: 'bgPane',
        interactive: true,
        style: {
          color: OVL_PURPLE,
          fillColor: fillColor,
          fillOpacity: intensity,
          weight: 0.8,
          opacity: 0.6
        },
        onEachFeature: function(feat, layer) {
          layer.bindPopup(popupHtml, {autoPan: true, maxWidth: 280});
          layer.on('click', function(e) {
            this.openPopup(e.latlng);
          });
          layer.on('mouseover', function() {
            this.setStyle({ weight: 2.5, fillOpacity: Math.min(0.75, myIntensity + 0.2) });
          });
          layer.on('mouseout', function() {
            this.setStyle({ weight: 0.8, fillOpacity: myIntensity });
          });
        }
      });

      countyLayer.addLayer(poly);
    } catch(err) {
      errors++;
      if (errors <= 3) console.warn('Error rendering BG ' + bgId + ':', err);
    }
  }

  // console.log('[BG] done ' + countyFips + ': ' + countyLayer.getLayers().length + ' layers, ' + errors + ' errors');
  bgLayer.addLayer(countyLayer);
  loadedCounties[countyFips] = countyLayer;
  updateBgCount();
}

function bgIntensity(overlapCount) {
  if (overlapCount <= 0) return 0;
  return Math.min(0.65, 0.12 + Math.log10(Math.max(1, overlapCount)) * 0.14);
}

function bgFillColor(total, fiber, hfc) {
  var fiberRatio = fiber / Math.max(total, 1);
  if (fiberRatio > 0.3) return '#DC2626';  // High fiber-vs-fiber = red
  if (fiberRatio > 0.1) return '#9333EA';  // Mixed = deeper purple
  return OVL_PURPLE;
}

function buildBGPopup(bgId, data, countyName, stateAbbr) {
  var rate = data.a > 0 ? (data.o / data.a * 100).toFixed(1) : '0';
  var fiberPct = data.o > 0 ? (data.of / data.o * 100).toFixed(0) : '0';
  return '<div class="popup-hdr" style="color:' + OVL_PURPLE + '">Block Group ' + bgId + '</div>' +
    '<div style="font-size:0.68rem;color:#6b7280;margin-bottom:6px">' + countyName + ' County, ' + stateAbbr + '</div>' +
    '<div class="popup-row"><span class="popup-lbl">Overlap BSLs:</span><span class="popup-val" style="color:' + OVL_PURPLE + '">' + fmt(data.o) + '</span></div>' +
    '<div class="popup-row"><span class="popup-lbl">vs Fiber:</span><span class="popup-val">' + fmt(data.of) + ' (' + fiberPct + '%)</span></div>' +
    '<div class="popup-row"><span class="popup-lbl">vs HFC/Cable:</span><span class="popup-val">' + fmt(data.oh) + '</span></div>' +
    '<div class="popup-row"><span class="popup-lbl">VZ+FR BSLs:</span><span class="popup-val" style="color:' + VZ_RED + '">' + fmt(data.a) + '</span></div>' +
    '<div class="popup-row"><span class="popup-lbl">CHTR+COX BSLs:</span><span class="popup-val" style="color:' + CHTR_BLUE + '">' + fmt(data.b) + '</span></div>' +
    '<div class="popup-row"><span class="popup-lbl">Overlap Rate:</span><span class="popup-val">' + rate + '%</span></div>' +
    '<div style="margin-top:6px;padding-top:4px;border-top:1px solid #e5e7eb">' +
    '<a href="https://broadbandmap.fcc.gov/location-summary/fixed?speed=25_3&zoom=14" target="_blank" style="font-size:0.62rem;color:#2563EB;text-decoration:underline">Verify on FCC Broadband Map</a></div>';
}

function updateBgCount() {
  var total = 0;
  Object.values(loadedCounties).forEach(function(v) {
    if (v && v.getLayers) total += v.getLayers().length;
  });
  var el = document.getElementById('bgCount');
  if (el) el.textContent = total.toLocaleString();
}

// ================================================================
// INIT
// ================================================================
renderStrip();
renderCallout();
renderExhibit();
renderStateTable();
renderPairs();
renderMeth();
initMap();
</script>
